---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stackable-docs-ingestion-script
data:
  ingest.py: |
    #!/usr/bin/env python3
    """
    Stackable documentation ingestion script for OpenSearch RAG demo.
    Crawls docs.stackable.tech, filters to essential chunks, generates embeddings, and ingests.
    """
    import os
    import json
    import time
    import re
    import sys
    import requests
    from urllib.parse import urljoin, urlparse
    from typing import List, Dict, Set
    from concurrent.futures import ThreadPoolExecutor, as_completed
    from opensearchpy import OpenSearch, helpers
    from requests.auth import HTTPBasicAuth
    from bs4 import BeautifulSoup

    # Configuration
    OPENSEARCH_HOST = os.getenv('OPENSEARCH_HOST', 'opensearch')
    OPENSEARCH_PORT = int(os.getenv('OPENSEARCH_PORT', '9200'))
    OPENSEARCH_USER = os.getenv('OPENSEARCH_USER', 'admin')
    OPENSEARCH_PASSWORD = os.getenv('OPENSEARCH_PASSWORD', 'adminadmin')
    OLLAMA_HOST = os.getenv('OLLAMA_HOST', 'ollama')
    OLLAMA_PORT = int(os.getenv('OLLAMA_PORT', '11434'))
    INDEX_NAME = os.getenv('INDEX_NAME', 'rag-documents')

    # Crawler configuration
    BASE_URL = "https://docs.stackable.tech/"
    START_URL = "https://docs.stackable.tech/home/stable/"
    MAX_PAGES = 600  # Increased for comprehensive coverage on Azure
    TARGET_CHUNK_SIZE = 1200  # Larger chunks preserve more context
    MAX_CHUNK_SIZE = 3000  # Allow complete examples to stay intact
    MIN_CHUNK_SIZE = 400  # Avoid tiny navigation/TOC chunks

    # Filtering configuration - prioritize most valuable chunks
    TARGET_CHUNK_COUNT = 5000  # Comprehensive coverage with minimal filtering
    PRIORITY_KEYWORDS = ['first steps', 'getting started', 'installation', 'quick start', 'quickstart',
                         'deploy', 'deployment', 'setup', 'configure', 'configuration', 'usage', 'security', 'example', 'tutorial']
    FOUNDATIONAL_KEYWORDS = ['first steps', 'getting started', 'quick start', 'quickstart', 'minimal', 'simple example', 'basic example']

    def wait_for_services():
        """Wait for OpenSearch and Ollama to be ready."""
        print("Waiting for services to be ready...")

        # Wait for OpenSearch
        for i in range(60):
            try:
                response = requests.get(
                    f'https://{OPENSEARCH_HOST}:{OPENSEARCH_PORT}',
                    auth=HTTPBasicAuth(OPENSEARCH_USER, OPENSEARCH_PASSWORD),
                    verify=False,
                    timeout=5
                )
                if response.status_code == 200:
                    print("OpenSearch is ready!")
                    break
            except Exception:
                print(f"Waiting for OpenSearch... ({i+1}/60)")
                time.sleep(5)

        # Wait for Ollama service
        print("Waiting for Ollama service...")
        for i in range(60):
            try:
                response = requests.get(f'http://{OLLAMA_HOST}:{OLLAMA_PORT}/api/tags', timeout=5)
                if response.status_code == 200:
                    print("Ollama service is ready!")
                    break
            except Exception:
                print(f"Waiting for Ollama... ({i+1}/60)")
                time.sleep(5)

    def get_embedding(text, retries=3, backoff=2):
        """Generate embedding for text using Ollama with retry logic."""
        for attempt in range(retries):
            try:
                response = requests.post(
                    f'http://{OLLAMA_HOST}:{OLLAMA_PORT}/api/embeddings',
                    json={'model': 'nomic-embed-text', 'prompt': text},
                    timeout=60
                )
                response.raise_for_status()
                return response.json()['embedding']
            except requests.exceptions.RequestException as e:
                if attempt < retries - 1:
                    wait_time = backoff * (attempt + 1)
                    print(f"  Retry {attempt + 1}/{retries - 1} after {wait_time}s: {e}")
                    time.sleep(wait_time)
                else:
                    raise

    def fetch_page(url: str):
        """Fetch and parse HTML page."""
        try:
            response = requests.get(url, timeout=10)
            response.raise_for_status()
            return BeautifulSoup(response.text, 'html.parser')
        except Exception as e:
            print(f"Error fetching {url}: {e}")
            return None

    def extract_main_content(soup):
        """Extract main article content, excluding navigation and chrome."""
        content = soup.find('article') or soup.find('main') or soup.find('div', class_='doc')
        if not content:
            content = soup.find('body')
        for element in content.find_all(['nav', 'footer', 'aside']):
            element.decompose()
        return content

    def categorize_url(url: str) -> Dict[str, str]:
        """Categorize URL into section and category."""
        parsed = urlparse(url)
        path_parts = [p for p in parsed.path.split('/') if p]

        category = 'general'
        section = 'documentation'
        repo = None

        if len(path_parts) >= 3:
            if path_parts[2] in ['airflow', 'druid', 'hbase', 'hdfs', 'hive', 'kafka',
                                  'nifi', 'opensearch', 'spark-k8s', 'superset', 'trino',
                                  'zookeeper', 'commons', 'listener', 'opa', 'secret']:
                category = 'operator'
                section = path_parts[2]
                repo = f"{path_parts[2]}-operator"
            elif path_parts[2] == 'management':
                category = 'management'
                section = path_parts[3] if len(path_parts) > 3 else 'management'
            elif path_parts[2] == 'platform':
                category = 'platform'
                section = path_parts[3] if len(path_parts) > 3 else 'platform'
            elif path_parts[2] == 'concepts':
                category = 'concepts'
                section = path_parts[3] if len(path_parts) > 3 else 'concepts'

        return {'category': category, 'section': section, 'repo': repo or section}

    def create_index(client):
        """Create OpenSearch index with k-NN mapping."""
        index_body = {
            'settings': {
                'index': {
                    'knn': True,
                    'number_of_shards': 1,
                    'number_of_replicas': 0
                }
            },
            'mappings': {
                'properties': {
                    'title': {'type': 'text'},
                    'content': {'type': 'text'},
                    'embedding': {
                        'type': 'knn_vector',
                        'dimension': 768,
                        'method': {
                            'name': 'hnsw',
                            'space_type': 'cosinesimil',
                            'engine': 'lucene',
                            'parameters': {'ef_construction': 128, 'm': 24}
                        }
                    },
                    'category': {'type': 'keyword'},
                    'section': {'type': 'keyword'},
                    'repo': {'type': 'keyword'},
                    'url': {'type': 'keyword'},
                    'hierarchy': {'type': 'keyword'},
                    'timestamp': {'type': 'date'},
                    'char_count': {'type': 'integer'},
                    'has_code_block': {'type': 'boolean'}
                }
            }
        }

        if client.indices.exists(index=INDEX_NAME):
            print(f"Index {INDEX_NAME} already exists. Deleting...")
            client.indices.delete(index=INDEX_NAME)

        client.indices.create(index=INDEX_NAME, body=index_body)
        print(f"Created index: {INDEX_NAME}")

    def extract_sections(content, url: str) -> List[Dict]:
        """Extract sections with hierarchy from content."""
        url_info = categorize_url(url)
        sections = []
        current_section = {
            'hierarchy': [],
            'content': [],
            'code_blocks': [],
            'url': url,
            'category': url_info['category'],
            'section': url_info['section'],
            'repo': url_info['repo']
        }

        for element in content.find_all(['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'pre', 'div']):
            if element.name in ['h1', 'h2', 'h3', 'h4', 'h5', 'h6']:
                if current_section['content']:
                    sections.append(current_section.copy())
                level = int(element.name[1])
                title = element.get_text(strip=True)
                current_section['hierarchy'] = current_section['hierarchy'][:level-1] + [title]
                current_section['content'] = [title]
                current_section['code_blocks'] = []
            elif element.name == 'pre' or (element.name == 'div' and 'listingblock' in element.get('class', [])):
                code = element.get_text(strip=False)
                if code and len(code) > 10:
                    current_section['code_blocks'].append(code)
                    current_section['content'].append(f"\n[CODE BLOCK]\n{code}\n[/CODE BLOCK]\n")
            elif element.name == 'p':
                text = element.get_text(strip=True)
                if text and len(text) > 20:
                    current_section['content'].append(text)

        if current_section['content']:
            sections.append(current_section)
        return sections

    def chunk_section(section: Dict) -> List[Dict]:
        """Chunk a section into smaller pieces if needed."""
        full_text = '\n\n'.join(section['content'])

        if len(full_text) <= MAX_CHUNK_SIZE:
            return [{
                'text': full_text,
                'hierarchy': section['hierarchy'],
                'url': section['url'],
                'category': section['category'],
                'section': section['section'],
                'repo': section['repo'],
                'has_code_block': len(section['code_blocks']) > 0,
                'char_count': len(full_text)
            }]

        chunks = []
        current_chunk = []
        current_size = 0
        hierarchy_text = ' > '.join(section['hierarchy'])
        breadcrumb = f"# {section['section'].title()} > {hierarchy_text}\n\n"

        for paragraph in section['content']:
            para_size = len(paragraph)
            if current_size > 0 and (current_size + para_size) > TARGET_CHUNK_SIZE:
                if current_size >= MIN_CHUNK_SIZE:
                    chunk_text = breadcrumb + '\n\n'.join(current_chunk)
                    chunks.append({
                        'text': chunk_text,
                        'hierarchy': section['hierarchy'],
                        'url': section['url'],
                        'category': section['category'],
                        'section': section['section'],
                        'repo': section['repo'],
                        'has_code_block': any('[CODE BLOCK]' in p for p in current_chunk),
                        'char_count': len(chunk_text)
                    })
                    current_chunk = []
                    current_size = 0
            current_chunk.append(paragraph)
            current_size += para_size

        if current_chunk:
            chunk_text = breadcrumb + '\n\n'.join(current_chunk)
            chunks.append({
                'text': chunk_text,
                'hierarchy': section['hierarchy'],
                'url': section['url'],
                'category': section['category'],
                'section': section['section'],
                'repo': section['repo'],
                'has_code_block': any('[CODE BLOCK]' in p for p in current_chunk),
                'char_count': len(chunk_text)
            })

        return chunks if chunks else [{
            'text': full_text,
            'hierarchy': section['hierarchy'],
            'url': section['url'],
            'category': section['category'],
            'section': section['section'],
            'repo': section['repo'],
            'has_code_block': len(section['code_blocks']) > 0,
            'char_count': len(full_text)
        }]

    def discover_all_pages() -> Set[str]:
        """Discover all pages on docs.stackable.tech by crawling."""
        visited = set()
        to_visit = {START_URL}
        discovered = set()

        print(f"\nStarting site-wide crawl from {START_URL}")
        print(f"Max pages: {MAX_PAGES}")

        while to_visit and len(discovered) < MAX_PAGES:
            url = to_visit.pop()
            if url in visited:
                continue
            visited.add(url)

            if len(discovered) % 10 == 0:
                print(f"  Progress: {len(discovered)}/{MAX_PAGES} pages discovered")

            soup = fetch_page(url)
            if not soup:
                continue
            discovered.add(url)

            for link in soup.find_all('a', href=True):
                href = link['href']
                full_url = urljoin(url, href)
                if full_url.startswith(BASE_URL) and full_url not in visited:
                    # Only crawl /stable/ URLs, skip old versions (/24.3/, /23.7/) and nightly builds
                    if ('/home/stable/' in full_url or full_url == START_URL) and '/nightly/' not in full_url:
                        if not any(x in full_url for x in ['#', '.css', '.js', '.png', '.jpg', '.svg', 'mailto:', 'github.com', 'discord.com']):
                            if full_url.endswith('.html') or '.' not in full_url.split('/')[-1]:
                                to_visit.add(full_url)

        print(f"\nDiscovery complete: {len(discovered)} pages found")
        return discovered

    def crawl_all_pages() -> List[Dict]:
        """Crawl all discovered pages and return chunks."""
        print(f"\n{'='*60}")
        print(f"Crawling docs.stackable.tech pages")
        print(f"{'='*60}")

        pages = discover_all_pages()
        all_chunks = []
        processed = 0

        for url in sorted(pages):
            processed += 1
            if processed % 10 == 0:
                print(f"Processing: {processed}/{len(pages)} pages ({len(all_chunks)} chunks so far)")

            soup = fetch_page(url)
            if not soup:
                continue

            content = extract_main_content(soup)
            sections = extract_sections(content, url)

            for section in sections:
                chunks = chunk_section(section)
                all_chunks.extend(chunks)

        print(f"\nGenerated {len(all_chunks)} total chunks")
        return all_chunks

    def score_chunk(chunk):
        """Score chunk by importance for RAG demo."""
        score = 0
        text_lower = chunk.get('text', '').lower()
        hierarchy = [h.lower() for h in chunk.get('hierarchy', [])]
        hierarchy_str = ' '.join(hierarchy)
        char_count = chunk.get('char_count', 0)

        # Penalize useless navigation/TOC chunks
        navigation_keywords = ["what's next", 'next steps', 'table of contents', 'overview', 'introduction']
        is_navigation = any(kw in text_lower for kw in navigation_keywords)
        if is_navigation and char_count < 500:
            score -= 20  # Heavily penalize short navigation chunks

        # Penalize very short chunks (likely TOC/navigation)
        if char_count < 400:
            score -= 15

        # Boost operator content
        if chunk.get('category') == 'operator':
            score += 10

        # Heavily boost foundational getting-started content (but only if substantial)
        if char_count >= 500:  # Must have real content
            for keyword in FOUNDATIONAL_KEYWORDS:
                if keyword in hierarchy_str or keyword in text_lower:
                    score += 25
                    break

        # Boost priority sections (check both hierarchy AND content)
        priority_in_hierarchy = any(keyword in hierarchy_str for keyword in PRIORITY_KEYWORDS)
        priority_in_content = any(keyword in text_lower for keyword in PRIORITY_KEYWORDS)

        if priority_in_hierarchy and char_count >= 600:
            score += 15
        elif priority_in_content:
            score += 6

        # Detect and heavily boost complete CRD examples
        has_apiversion = 'apiversion:' in text_lower
        has_kind = 'kind:' in text_lower
        has_metadata = 'metadata:' in text_lower
        has_spec = 'spec:' in text_lower

        if has_apiversion and has_kind and has_metadata and has_spec:
            score += 30  # Complete CRD example - very valuable!
            # Extra boost if it's a basic example (not catalog/security)
            if 'catalog' not in text_lower and 'authentication' not in text_lower:
                score += 15  # Basic cluster examples are gold!

        # Boost chunks with code blocks (but only if substantive)
        if chunk.get('has_code_block', False) and char_count >= 600:
            score += 12

        # Boost chunks that contain cluster/deployment keywords
        if any(word in text_lower for word in ['cluster', 'deployment', 'deploy a', 'create a', 'kubectl apply']):
            score += 5

        # Prefer substantive chunks (larger is better)
        if 800 <= char_count <= 2500:
            score += 12
        elif 600 <= char_count < 800:
            score += 6
        elif char_count >= 2500:
            score += 8  # Large but still valuable

        # Boost concepts (architectural knowledge)
        if chunk.get('category') == 'concepts':
            score += 7

        return score

    def filter_chunks(chunks, target_count=TARGET_CHUNK_COUNT):
        """Filter chunks to keep most valuable ones."""
        scored_chunks = [(score_chunk(chunk), chunk) for chunk in chunks]
        scored_chunks.sort(reverse=True, key=lambda x: x[0])
        filtered = [chunk for score, chunk in scored_chunks[:target_count]]

        print(f"\n{'='*60}")
        print(f"Chunk Filtering")
        print(f"{'='*60}")
        print(f"Original chunks: {len(chunks)}")
        print(f"Filtered to: {len(filtered)} chunks")

        by_section = {}
        with_code = sum(1 for c in filtered if c.get('has_code_block', False))
        for chunk in filtered:
            sec = chunk.get('section', 'unknown')
            by_section[sec] = by_section.get(sec, 0) + 1

        print(f"\nFiltered chunks by section:")
        for sec, count in sorted(by_section.items(), key=lambda x: x[1], reverse=True)[:15]:
            print(f"  {sec:20} {count:4} chunks")
        print(f"\nChunks with code blocks: {with_code}/{len(filtered)}")

        return filtered

    def load_all_stackable_docs():
        """Load all Stackable documentation by crawling docs.stackable.tech."""
        all_chunks = crawl_all_pages()
        if not all_chunks:
            return []

        # Filter to most valuable chunks
        filtered_chunks = filter_chunks(all_chunks)

        print(f"\n{'='*60}")
        print(f"Final chunk count: {len(filtered_chunks)}")
        print(f"{'='*60}")

        return filtered_chunks

    def process_document_embedding(doc, i, total):
        """Process a single document - generate embedding and prepare for ingestion."""
        try:
            hierarchy_str = ' > '.join(doc.get('hierarchy', []))
            title = f"{doc.get('section', 'Unknown')}: {hierarchy_str}" if hierarchy_str else doc.get('section', 'Unknown')

            embedding = get_embedding(doc['text'])

            return {
                '_index': INDEX_NAME,
                '_source': {
                    'title': title,
                    'content': doc['text'],
                    'category': doc.get('category', ''),
                    'repo': doc.get('repo', ''),
                    'section': doc.get('section', ''),
                    'url': doc.get('url', ''),
                    'hierarchy': doc.get('hierarchy', []),
                    'embedding': embedding,
                    'timestamp': time.strftime('%Y-%m-%dT%H:%M:%S'),
                    'char_count': doc.get('char_count', 0),
                    'has_code_block': doc.get('has_code_block', False)
                }
            }
        except Exception as e:
            print(f"  Error processing document {i+1}/{total}: {e}")
            return None

    def ingest_documents(client, documents):
        """Ingest documents with embeddings into OpenSearch using parallel workers."""
        print(f"\nStarting parallel ingestion of {len(documents)} chunks...")
        print(f"Using 12 concurrent workers for embedding generation\n")

        actions = []
        completed = 0

        # Use ThreadPoolExecutor for parallel embedding generation
        with ThreadPoolExecutor(max_workers=12) as executor:
            # Submit all embedding tasks
            future_to_doc = {
                executor.submit(process_document_embedding, doc, i, len(documents)): i
                for i, doc in enumerate(documents)
            }

            # Collect results as they complete
            for future in as_completed(future_to_doc):
                completed += 1
                if completed % 50 == 0:
                    print(f"  Progress: {completed}/{len(documents)} chunks processed ({completed*100//len(documents)}%)")

                result = future.result()
                if result:
                    actions.append(result)

                    # Bulk insert in batches
                    if len(actions) >= 100:
                        helpers.bulk(client, actions)
                        actions = []

        # Insert remaining documents
        if actions:
            helpers.bulk(client, actions)

        print(f"\nSuccessfully ingested {completed} documents!")

    def main():
        """Main ingestion workflow."""
        print("="*60)
        print("Stackable Documentation Ingestion for RAG")
        print("="*60)

        wait_for_services()

        client = OpenSearch(
            hosts=[{'host': OPENSEARCH_HOST, 'port': OPENSEARCH_PORT}],
            http_auth=(OPENSEARCH_USER, OPENSEARCH_PASSWORD),
            use_ssl=True,
            verify_certs=False,
            ssl_show_warn=False
        )

        create_index(client)

        documents = load_all_stackable_docs()

        if not documents:
            print("❌ ERROR: No documents fetched!")
            return

        ingest_documents(client, documents)

        time.sleep(2)
        count = client.count(index=INDEX_NAME)['count']
        print(f"\n{'='*60}")
        print(f"Ingestion Summary")
        print(f"{'='*60}")
        print(f"Total chunks indexed: {count}")

        agg_query = {
            "size": 0,
            "aggs": {
                "repos": {"terms": {"field": "repo", "size": 50}},
                "categories": {"terms": {"field": "category", "size": 20}},
                "size_ranges": {
                    "range": {
                        "field": "char_count",
                        "ranges": [
                            {"to": 200, "key": "tiny (<200)"},
                            {"from": 200, "to": 600, "key": "small (200-600)"},
                            {"from": 600, "to": 1000, "key": "medium (600-1000)"},
                            {"from": 1000, "to": 1500, "key": "large (1000-1500)"},
                            {"from": 1500, "key": "oversized (>1500)"}
                        ]
                    }
                },
                "avg_size": {"avg": {"field": "char_count"}},
                "max_size": {"max": {"field": "char_count"}}
            }
        }
        result = client.search(index=INDEX_NAME, body=agg_query)

        print(f"\nChunks by repository:")
        for bucket in sorted(result['aggregations']['repos']['buckets'],
                            key=lambda x: x['doc_count'], reverse=True):
            print(f"  {bucket['key']:30} {bucket['doc_count']:4} chunks")

        print(f"\nChunks by category:")
        for bucket in result['aggregations']['categories']['buckets']:
            print(f"  {bucket['key']:20} {bucket['doc_count']:4} chunks")

        print(f"\nChunk size distribution:")
        for bucket in result['aggregations']['size_ranges']['buckets']:
            print(f"  {bucket['key']:20} {bucket['doc_count']:4} chunks")

        avg_size = result['aggregations']['avg_size']['value']
        max_size = result['aggregations']['max_size']['value']
        print(f"\nChunk size stats:")
        if avg_size is not None:
            print(f"  Average: {avg_size:.0f} chars")
        else:
            print(f"  Average: N/A")
        if max_size is not None:
            print(f"  Maximum: {max_size:.0f} chars")
        else:
            print(f"  Maximum: N/A")

        print(f"\n{'='*60}")
        print("Ingestion complete!")
        print(f"{'='*60}")

    if __name__ == '__main__':
        main()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stackable-docs-ingestion
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: ingestion
        image: python:3.11-slim
        command:
        - /bin/bash
        - -c
        - |
          apt-get update -qq
          pip install -q opensearch-py requests urllib3 beautifulsoup4
          python -u /scripts/ingest.py
        env:
        - name: OPENSEARCH_HOST
          value: "opensearch"
        - name: OPENSEARCH_PORT
          value: "9200"
        - name: OPENSEARCH_USER
          value: "admin"
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: opensearch-user
              key: password
        - name: OLLAMA_HOST
          value: "ollama"
        - name: OLLAMA_PORT
          value: "11434"
        - name: INDEX_NAME
          value: "rag-documents"
        volumeMounts:
        - name: script
          mountPath: /scripts
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
      volumes:
      - name: script
        configMap:
          name: stackable-docs-ingestion-script
