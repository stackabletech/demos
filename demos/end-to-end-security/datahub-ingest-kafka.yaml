# DataHub ingestion job — pulls Kafka topic metadata into DataHub GMS.
#
# Runs once as part of the demo. Ingests the demo topics created by the sibling
# create-kafka-topics job (transactions, customer-events, access-logs) into
# DataHub so they show up as Kafka "Topic" datasets.
#
# TLS: this Kafka enforces mutual TLS (kafka-client-tls AuthenticationClass in
# stacks/end-to-end-security/kafka.yaml). DataHub's Kafka source uses librdkafka,
# so — unlike the Trino job — the client certificate is passed straight through
# `connection.consumer_config` as PEM file paths (ssl.ca.location /
# ssl.certificate.location / ssl.key.location). We mount a certificate issued by
# the "tls" SecretClass and run with fsGroup 1000 so the (non-root) ingest
# container can read the secret-operator-provisioned files.
#   - Bootstrap via the headless Service FQDN: it is a SAN of the broker
#     certificate, so TLS hostname verification succeeds (the bootstrap Service
#     name is not in the SANs). 9093 is the secured "kafka-tls" port.
#   - There is no schema registry in this stack, so topics are ingested as
#     schema-less datasets. DataHub logs a harmless "no matching subject name"
#     warning for each topic — expected, not a failure.
#
# Auth (sink): identical to the Trino/Superset jobs. GMS enforces Metadata
# Service Authentication, so the datahub-rest sink authenticates as the DataHub
# system user. DataHub's system authenticator expects the credentials verbatim
# as `Basic <id>:<secret>` — NOT standard base64-encoded Basic auth — so we build
# that header from env vars sourced from the datahub-auth-secrets Secret.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-kafka-recipe
data:
  recipe.yaml: |
    pipeline_name: e2e-demo-kafka-ingestion

    source:
      type: kafka
      config:
        connection:
          # Use the headless Service FQDN that's in the broker cert SANs.
          bootstrap: 'kafka-broker-default-headless.{{ NAMESPACE }}.svc.cluster.local:9093'
          # Mutual TLS via librdkafka using the PEM files from the "tls"
          # SecretClass (mounted at /stackable/tls).
          consumer_config:
            security.protocol: SSL
            ssl.ca.location: /stackable/tls/ca.crt
            ssl.certificate.location: /stackable/tls/tls.crt
            ssl.key.location: /stackable/tls/tls.key
        # Only ingest the demo topics, not Kafka's internal topics.
        topic_patterns:
          allow:
            - '^transactions$'
            - '^customer-events$'
            - '^access-logs$'
        stateful_ingestion:
          enabled: true

    sink:
      type: datahub-rest
      config:
        server: 'http://datahub-datahub-gms:8080'
        # System Basic auth. DataHub's system authenticator compares the header
        # value after "Basic " verbatim against "<systemClientId>:<secret>", so
        # this must NOT be base64-encoded. ${VAR} is expanded by DataHub from the
        # container env (injected from the datahub-auth-secrets Secret).
        extra_headers:
          Authorization: 'Basic ${DATAHUB_SYSTEM_CLIENT_ID}:${DATAHUB_SYSTEM_CLIENT_SECRET}'
---
apiVersion: batch/v1
kind: Job
metadata:
  name: datahub-ingest-kafka
  labels:
    stackable.tech/vendor: Stackable
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: datahub-ingest
        source: kafka
    spec:
      restartPolicy: OnFailure
      serviceAccountName: demo-serviceaccount
      securityContext:
        # secret-operator mounts the certificate files as root:1000 mode 0660.
        # fsGroup 1000 adds that GID to the ingest container so it can read them.
        fsGroup: 1000
      initContainers:
        - name: wait-for-kafka-topics
          image: oci.stackable.tech/sdp/testing-tools:0.3.0-stackable0.0.0-dev
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              echo "Waiting for Job create-kafka-topics to complete"
              kubectl wait --timeout=30m --for=condition=complete job/create-kafka-topics
      containers:
        - name: ingest
          image: acryldata/datahub-ingestion:v1.6.0
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "== datahub CLI =="
              datahub --version || true
              echo "== running ingestion =="
              datahub ingest -c /recipe/recipe.yaml
              echo "== ingestion complete =="
          env:
            # Credentials for the datahub-rest sink's system Basic auth header.
            # systemClientId is the chart default; the secret comes from the same
            # datahub-auth-secrets Secret that GMS reads.
            - name: DATAHUB_SYSTEM_CLIENT_ID
              value: __datahub_system
            - name: DATAHUB_SYSTEM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: datahub-auth-secrets
                  key: system_client_secret
          volumeMounts:
            - name: recipe
              mountPath: /recipe
            - name: tls
              mountPath: /stackable/tls
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: recipe
          configMap:
            name: datahub-kafka-recipe
        # secret-operator ephemeral volume — provisions a client certificate
        # (tls.crt / tls.key / ca.crt as PEM) from the same "tls" SecretClass
        # that Kafka trusts for client authentication.
        - name: tls
          ephemeral:
            volumeClaimTemplate:
              metadata:
                annotations:
                  secrets.stackable.tech/class: tls
                  secrets.stackable.tech/scope: pod
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: "1"
                storageClassName: secrets.stackable.tech
                volumeMode: Filesystem
