# Trino with the bundled, first-party OpenLineage event listener enabled.
#
# This demo deliberately enables OpenLineage *without* any operator/CRD changes, using only the
# existing override mechanisms:
#   * `configOverrides` adds `event-listener.config-files` to `config.properties`, and
#   * `podOverrides` mounts the `event-listener.properties` file (from the ConfigMap below).
# The `openlineage` event listener plugin itself ships in the Trino distribution since Trino 450.
#
# Trino here has two catalogs: `tpch` as the read-only source, and an Iceberg `lakehouse` catalog
# (on the shared hive-iceberg metastore + MinIO) that the demo DAG writes its ELT output into and
# that Spark later reads/extends - giving cross-engine lineage over shared Iceberg tables.
#
# For now, on K8s 1.35, TrinoCatalogs need to be deployed before the TrinoCluster.
# See: https://github.com/stackabletech/trino-operator/issues/854
---
apiVersion: trino.stackable.tech/v1alpha1
kind: TrinoCatalog
metadata:
  name: tpch
  labels:
    trino: trino
spec:
  connector:
    tpch: {}
---
# Iceberg catalog backed by the shared `hive-iceberg` metastore and the MinIO `demo` bucket.
# The demo DAG writes its ELT output here as Iceberg tables; the Spark job then reads one of them and
# writes a derived table back - both engines pointing at this same catalog + metastore + bucket.
apiVersion: trino.stackable.tech/v1alpha1
kind: TrinoCatalog
metadata:
  name: lakehouse
  labels:
    trino: trino
spec:
  connector:
    iceberg:
      metastore:
        configMap: hive-iceberg
      s3:
        reference: minio
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-openlineage
data:
  # Trino reads this file because `config.properties` points at it via `event-listener.config-files`
  # (see the `configOverrides` on the coordinator below).
  event-listener.properties: |
    event-listener.name=openlineage
    openlineage-event-listener.transport.type=HTTP
    openlineage-event-listener.transport.url=http://marquez:5000
    openlineage-event-listener.transport.endpoint=/api/v1/lineage
    # Must be Trino's real serving address (HTTPS on 8443 - TLS is enabled and 8080 is not exposed).
    # This is the naming string for the *dataset* namespace; matching the address Airflow uses in its
    # Trino connection makes both producers name the same tables `trino://trino-coordinator:8443`, so
    # their lineage attaches to one shared set of dataset nodes instead of two duplicate namespaces.
    openlineage-event-listener.trino.uri=https://trino-coordinator:8443
    # Set an explicit, colon-free job namespace. Without this the namespace defaults to the dataset
    # namespace (`trino://trino-coordinator:8443`), and Marquez's NodeId parser cannot split
    # `job:trino://trino-coordinator:8443:<queryId>` because Trino query IDs start with a digit -
    # its URI heuristic then treats the `:<queryId>` delimiter as a `host:port` colon and 500s when
    # a job is opened. A plain namespace keeps job NodeIds parseable.
    openlineage-event-listener.namespace=trino-openlineage-demo
---
apiVersion: trino.stackable.tech/v1alpha1
kind: TrinoCluster
metadata:
  name: trino
spec:
  image:
    productVersion: "481"
    pullPolicy: IfNotPresent
  clusterConfig:
    catalogLabelSelector:
      matchLabels:
        trino: trino
    authentication:
      - authenticationClass: trino-users
    tls:
      # Static (password) authentication requires TLS. `tls` is the SecretClass that
      # secret-operator ships out of the box, so nothing extra needs to be defined here.
      serverSecretClass: tls
  coordinators:
    roleConfig:
      listenerClass: external-stable
    config:
      resources:
        cpu:
          min: "500m"
          max: "2"
        memory:
          limit: "4Gi"
    # The event listener only needs to run on the coordinator: that is where query lifecycle
    # events (and their table-/column-level lineage) are produced.
    configOverrides:
      config.properties:
        event-listener.config-files: /stackable/mount/openlineage/event-listener.properties
    podOverrides:
      spec:
        containers:
          - name: trino
            volumeMounts:
              - name: openlineage-config
                mountPath: /stackable/mount/openlineage
        volumes:
          - name: openlineage-config
            configMap:
              name: trino-openlineage
    roleGroups:
      default:
        replicas: 1
  workers:
    config:
      resources:
        cpu:
          min: "1"
          max: "4"
        memory:
          limit: "4Gi"
    roleGroups:
      default:
        replicas: 1
---
apiVersion: authentication.stackable.tech/v1alpha1
kind: AuthenticationClass
metadata:
  name: trino-users
spec:
  provider:
    static:
      userCredentialsSecret:
        name: trino-users
---
apiVersion: v1
kind: Secret
metadata:
  name: trino-users
type: kubernetes.io/opaque
stringData:
  admin: "{{ trinoAdminPassword }}"
