# Airflow with the native OpenLineage provider enabled.
#
# As with Trino, OpenLineage is switched on here *without* any operator/CRD changes - purely via
# `envOverrides`. The Airflow OpenLineage provider (`apache-airflow-providers-openlineage`) activates
# automatically once `AIRFLOW__OPENLINEAGE__TRANSPORT` is set. Because the demo DAG uses the Trino
# provider's SQL operator, Airflow also reports dataset-level lineage, which shows up in Marquez next
# to the query lineage emitted by Trino itself.
#
# NOTE: this file is intentionally NOT wrapped in a Jinja raw block (unlike other airflow stacks)
# so that the NAMESPACE / password placeholders are templated by Tera. Keep this whole file - even
# comments - free of literal Tera tag sequences (double curly braces and percent-brace tags): Tera
# processes the raw bytes before YAML parsing, so a tag token in a comment is still interpreted.
# (An earlier version of this comment quoted a raw-block tag here, which opened an unclosed raw
# block and broke rendering with "expected tag" at EOF.)
---
apiVersion: airflow.stackable.tech/v1alpha2
kind: AirflowCluster
metadata:
  name: airflow
spec:
  image:
    productVersion: 3.2.2
    pullPolicy: IfNotPresent
  clusterConfig:
    loadExamples: false
    credentialsSecretName: airflow-credentials
    # The airflow-operator 'dev' schema moved the metadata DB connection out of the credentials
    # Secret into its own block. Points at the postgresql-airflow chart deployed by this stack.
    metadataDatabase:
      postgresql:
        host: postgresql-airflow
        database: airflow
        credentialsSecretName: airflow-postgresql-credentials
    volumes:
      - name: airflow-dags
        configMap:
          name: airflow-dags
    volumeMounts:
      - name: airflow-dags
        mountPath: /dags/openlineage_demo.py
        subPath: openlineage_demo.py
  webservers:
    roleConfig:
      listenerClass: external-stable
    config:
      resources:
        cpu:
          min: "2"
          max: "3"
        memory:
          limit: 3Gi
    envOverrides: &envOverrides
      AIRFLOW__CORE__DAGS_FOLDER: "/dags"
      # Point the OpenLineage provider at Marquez. This single block is the whole "toggle".
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://marquez:5000", "endpoint": "api/v1/lineage"}'
      AIRFLOW__OPENLINEAGE__NAMESPACE: "airflow-openlineage-demo"
      # Trino connection used by the demo DAG. TLS verification is disabled because Trino uses an
      # auto-generated (self-signed) CA in this demo; the password matches the `trino-users` Secret.
      AIRFLOW_CONN_TRINO_DEFAULT: '{"conn_type": "trino", "host": "trino-coordinator", "port": 8443, "login": "admin", "password": "{{ trinoAdminPassword }}", "extra": {"protocol": "https", "verify": false}}'
      # In-cluster Kubernetes connection used by the inlined SparkKubernetesOperator/Sensor in the DAG
      # to create and poll the SparkApplication. Same encoded connection as the airflow stack uses.
      AIRFLOW_CONN_KUBERNETES_IN_CLUSTER: "kubernetes://?__extra__=%7B%22extra__kubernetes__in_cluster%22%3A+true%2C+%22extra__kubernetes__kube_config%22%3A+%22%22%2C+%22extra__kubernetes__kube_config_path%22%3A+%22%22%2C+%22extra__kubernetes__namespace%22%3A+%22%22%7D"
    configOverrides:
      webserver_config.py:
        # Allow "POST /login/" without CSRF token
        WTF_CSRF_ENABLED: "False"
    roleGroups:
      default:
        replicas: 1
  kubernetesExecutors:
    # Task pods must carry the same env so the OpenLineage listener fires and the Trino
    # connection is available when the SQL operator runs.
    envOverrides: *envOverrides
  schedulers:
    envOverrides: *envOverrides
    roleGroups:
      default:
        replicas: 1
  dagProcessors:
    envOverrides: *envOverrides
    roleGroups:
      default:
        replicas: 1
  triggerers:
    envOverrides: *envOverrides
    roleGroups:
      default:
        replicas: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags
data:
  openlineage_demo.py: |
    """
    A layered ELT + Spark pipeline that produces cross-engine lineage in Marquez:

        tpch.tiny.customer ─┐
                            ├─(Trino)─> lakehouse.demo.customer_orders ─(Spark)─> lakehouse.demo.orders_by_nation
        tpch.tiny.orders  ──┘

    The Trino steps read from the built-in `tpch` catalog and write Iceberg tables into the
    `lakehouse` catalog (shared hive-iceberg metastore + MinIO). The final step submits a Spark job
    that reads `lakehouse.demo.customer_orders` and writes `lakehouse.demo.orders_by_nation` into the
    *same* Iceberg catalog.

    The single, connected end-to-end graph is the *Airflow* one: Airflow is one producer and names
    every dataset consistently, and the Spark step is stitched in by declaring its I/O under the same
    identities (see get_openlineage_facets_on_complete below). Trino's own event-listener lineage and
    Spark's own listener lineage are separate, self-contained views (each engine names datasets its
    own way, so Marquez does not auto-merge them). All producers report to one Marquez.

    The CLEAN-LINEAGE KNOB comments below call out what makes the graph readable and connected.

    NOTE: the Stackable `SparkKubernetesOperator`/`Sensor` from the `stackable.*` package are not in
    the Airflow image, so a minimal in-cluster implementation is inlined below. It creates the
    SparkApplication CR *and* waits for it (one operator, so there is no extra empty "sensor" job).
    """
    import time
    from datetime import datetime, timedelta
    from typing import TYPE_CHECKING, Optional, Sequence

    from airflow import DAG
    from airflow.exceptions import AirflowException
    from airflow.models import BaseOperator
    from airflow.providers.cncf.kubernetes.hooks.kubernetes import KubernetesHook
    from airflow.providers.common.sql.operators.sql import SQLExecuteQueryOperator

    if TYPE_CHECKING:
        from airflow.utils.context import Context


    class SparkKubernetesOperator(BaseOperator):
        template_fields: Sequence[str] = ("application_file", "namespace")
        ui_color = "#f4a460"

        FAILURE_STATES = ("Failed",)
        SUCCESS_STATES = ("Succeeded",)

        def __init__(
            self,
            *,
            application_file: dict,
            namespace: Optional[str] = None,
            kubernetes_conn_id: str = "kubernetes_in_cluster",
            api_group: str = "spark.stackable.tech",
            api_version: str = "v1alpha1",
            openlineage_inputs: Optional[list] = None,
            openlineage_outputs: Optional[list] = None,
            poll_interval: int = 10,
            timeout: int = 1800,
            **kwargs,
        ) -> None:
            super().__init__(**kwargs)
            self.application_file = application_file
            self.namespace = namespace
            self.kubernetes_conn_id = kubernetes_conn_id
            self.api_group = api_group
            self.api_version = api_version
            self.plural = "sparkapplications"
            self.poll_interval = poll_interval
            self.timeout = timeout
            # (namespace, name) pairs the *Airflow* OpenLineage provider will report as this task's
            # datasets. Set them to the SAME identities Airflow emits for the Trino tables so the Spark
            # step joins the ELT flow into one connected graph in the Airflow namespace (Marquez keys
            # datasets by namespace+name; matching them is what draws the edge). See the DAG below.
            self.openlineage_inputs = openlineage_inputs or []
            self.openlineage_outputs = openlineage_outputs or []

        def _link_spark_run_to_this_task(self, context):
            # CLEAN-LINEAGE KNOB #1: hand the Spark job this task's OpenLineage run identity via
            # `spark.openlineage.parent*`. That makes Spark report its own run as a CHILD of this Airflow
            # task (so the real Spark job is reachable from the DAG in Marquez) and, crucially, gives the
            # Spark run a real parent name instead of the `unknown` OpenLineage falls back to when it
            # can't resolve one at listener startup.
            try:
                from airflow.providers.openlineage.plugins.macros import (
                    lineage_job_name,
                    lineage_job_namespace,
                    lineage_run_id,
                )

                ti = context["task_instance"]
                conf = self.application_file["spec"]["sparkConf"]
                conf["spark.openlineage.parentJobNamespace"] = lineage_job_namespace()
                conf["spark.openlineage.parentJobName"] = lineage_job_name(ti)
                conf["spark.openlineage.parentRunId"] = lineage_run_id(ti)
            except Exception as e:  # never fail the task just because linking didn't work
                self.log.warning("Could not set OpenLineage parent run on the SparkApplication: %s", e)

        def execute(self, context: "Context"):
            self._link_spark_run_to_this_task(context)
            hook = KubernetesHook(conn_id=self.kubernetes_conn_id)
            name = self.application_file["metadata"]["name"]
            self.log.info("Creating SparkApplication %s ...", name)
            hook.create_custom_object(
                group=self.api_group,
                version=self.api_version,
                plural=self.plural,
                body=self.application_file,
                namespace=self.namespace,
            )
            # Wait inline (no separate sensor task => no extra empty job in the lineage graph).
            deadline = time.monotonic() + self.timeout
            while True:
                response = hook.get_custom_object(
                    group=self.api_group,
                    version=self.api_version,
                    plural=self.plural,
                    name=name,
                    namespace=self.namespace,
                )
                phase = response.get("status", {}).get("phase")
                if phase in self.FAILURE_STATES:
                    raise AirflowException(f"SparkApplication {name} failed with state: {phase}")
                if phase in self.SUCCESS_STATES:
                    self.log.info("SparkApplication %s succeeded", name)
                    return name
                if time.monotonic() > deadline:
                    raise AirflowException(f"SparkApplication {name} timed out (state: {phase})")
                self.log.info("SparkApplication %s is in state: %s", name, phase)
                time.sleep(self.poll_interval)

        def get_openlineage_facets_on_complete(self, task_instance):
            # CLEAN-LINEAGE KNOB #2: emit dataset lineage for the Spark step from Airflow's side. Because
            # the SparkApplication runs out-of-process, Airflow can't introspect it - so we declare the
            # I/O explicitly. Using the Trino datasets' exact namespace+names makes `customer_orders` the
            # shared node between the Trino ELT and this Spark step, connecting the whole flow in one
            # Marquez graph.
            from airflow.providers.openlineage.extractors import OperatorLineage
            from airflow.providers.common.compat.openlineage.facet import Dataset

            return OperatorLineage(
                inputs=[Dataset(namespace=ns, name=name) for ns, name in self.openlineage_inputs],
                outputs=[Dataset(namespace=ns, name=name) for ns, name in self.openlineage_outputs],
            )


    def build_spark_application(name: str, namespace: str) -> dict:
        """The SparkApplication that reads customer_orders and writes orders_by_nation."""
        return {
            "apiVersion": "spark.stackable.tech/v1alpha1",
            "kind": "SparkApplication",
            "metadata": {"name": name, "namespace": namespace},
            "spec": {
                "sparkImage": {
                    # Iceberg 1.11.0 only supports Spark 4.1.x (kept in sync with the data-lakehouse
                    # demo). NOTE: OpenLineage's newest Spark module is `spark40` - the listener on
                    # Spark 4.1 is not officially covered yet; verify events reach Marquez on a real
                    # cluster and, if the listener breaks, drop to Spark 4.0.x + Iceberg 1.10.x.
                    "productVersion": "4.1.2",
                    "pullPolicy": "IfNotPresent",
                },
                "mode": "cluster",
                "mainApplicationFile": "local:///stackable/spark/jobs/orders-by-nation.py",
                "deps": {
                    "packages": [
                        "org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.11.0",
                        "io.openlineage:openlineage-spark_2.13:1.51.0",
                    ]
                },
                "s3connection": {"reference": "minio"},
                "sparkConf": {
                    # CLEAN-LINEAGE KNOB #3: set spark.app.name as a Spark *config* (not only via
                    # SparkSession.builder.appName in the script). The OpenLineage listener reads the app
                    # name when the SparkContext starts; if it's only set later by the builder, the listener
                    # has already stamped `null`/`unknown`. Setting it here yields a stable job name.
                    "spark.app.name": "orders-by-nation",
                    # --- Iceberg catalog `lakehouse` on the shared hive-iceberg metastore ---
                    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions",
                    "spark.sql.catalog.lakehouse": "org.apache.iceberg.spark.SparkCatalog",
                    "spark.sql.catalog.lakehouse.type": "hive",
                    "spark.sql.catalog.lakehouse.uri": "thrift://hive-iceberg-metastore:9083",
                    # --- OpenLineage: the Spark "toggle" - listener + HTTP transport to Marquez ---
                    "spark.extraListeners": "io.openlineage.spark.agent.OpenLineageSparkListener",
                    "spark.openlineage.transport.type": "http",
                    "spark.openlineage.transport.url": "http://marquez:5000",
                    "spark.openlineage.namespace": "spark-openlineage-demo",
                    # parentJobNamespace/parentJobName/parentRunId are injected at task runtime by the
                    # operator (see _link_spark_run_to_this_task) so they carry this run's real identity.
                },
                "volumes": [
                    {"name": "script", "configMap": {"name": "spark-openlineage-job"}},
                    {
                        "name": "spark-tls",
                        "ephemeral": {
                            "volumeClaimTemplate": {
                                "metadata": {
                                    "annotations": {
                                        "secrets.stackable.tech/class": "tls",
                                        "secrets.stackable.tech/scope": "pod",
                                        "secrets.stackable.tech/format": "tls-pkcs12",
                                        "secrets.stackable.tech/format.compatibility.tls-pkcs12.password": "changeit",
                                        "secrets.stackable.tech/backend.autotls.cert.lifetime": "14d",
                                    }
                                },
                                "spec": {
                                    "accessModes": ["ReadWriteOnce"],
                                    "resources": {"requests": {"storage": "1"}},
                                    "storageClassName": "secrets.stackable.tech",
                                },
                            }
                        },
                    },
                ],
                "job": {"config": {"resources": {"cpu": {"min": "100m", "max": "1"}}}},
                "driver": {
                    "config": {
                        "resources": {
                            "cpu": {"min": "1", "max": "1"},
                            "memory": {"limit": "2Gi"},
                        },
                        "volumeMounts": [
                            {"name": "script", "mountPath": "/stackable/spark/jobs"},
                            {"name": "spark-tls", "mountPath": "/stackable/tls"},
                        ],
                    }
                },
                "executor": {
                    "replicas": 1,
                    "config": {
                        "resources": {
                            "cpu": {"min": "1", "max": "2"},
                            "memory": {"limit": "2Gi"},
                        },
                        "volumeMounts": [
                            {"name": "script", "mountPath": "/stackable/spark/jobs"},
                            {"name": "spark-tls", "mountPath": "/stackable/tls"},
                        ],
                    },
                },
            },
        }


    with DAG(
        dag_id="openlineage_demo",
        schedule=None,
        start_date=datetime(2024, 1, 1),
        catchup=False,
        dagrun_timeout=timedelta(minutes=60),
        tags=["openlineage", "trino", "spark", "iceberg"],
    ) as dag:
        # CLEAN-LINEAGE KNOB #4: keep each SQL task a *single* statement. `CREATE OR REPLACE TABLE`
        # (instead of DROP + CREATE) means one query per task, so each task maps to exactly one lineage
        # job that carries the datasets - no empty extra `.query.N` job for the throwaway DROP.
        #
        # CREATE SCHEMA is pure DDL with no dataset input/output, so its job is intentionally
        # dataset-less (OpenLineage only tracks data flow, not catalog/namespace management).
        create_schema = SQLExecuteQueryOperator(
            task_id="create_schema",
            conn_id="trino_default",
            # s3a:// (not s3://) so the location scheme matches what the Spark S3A client uses when it
            # reads the table back - avoids a Trino-writes-s3:// / Spark-reads-s3a:// mismatch.
            # `demo` is the bucket the standalone MinIO template creates.
            sql="CREATE SCHEMA IF NOT EXISTS lakehouse.demo WITH (location = 's3a://demo/lakehouse')",
        )

        load_customers = SQLExecuteQueryOperator(
            task_id="load_customers",
            conn_id="trino_default",
            sql=(
                "CREATE OR REPLACE TABLE lakehouse.demo.customers AS "
                "SELECT custkey, name, nationkey, acctbal "
                "FROM tpch.tiny.customer"
            ),
        )

        load_orders = SQLExecuteQueryOperator(
            task_id="load_orders",
            conn_id="trino_default",
            sql=(
                "CREATE OR REPLACE TABLE lakehouse.demo.orders AS "
                "SELECT orderkey, custkey, orderstatus, totalprice, orderdate "
                "FROM tpch.tiny.orders"
            ),
        )

        customer_orders = SQLExecuteQueryOperator(
            task_id="customer_orders",
            conn_id="trino_default",
            sql=(
                "CREATE OR REPLACE TABLE lakehouse.demo.customer_orders AS "
                "SELECT c.custkey, c.name, c.nationkey, "
                "       count(o.orderkey) AS order_count, "
                "       sum(o.totalprice) AS total_spent "
                "FROM lakehouse.demo.customers c "
                "LEFT JOIN lakehouse.demo.orders o ON c.custkey = o.custkey "
                "GROUP BY c.custkey, c.name, c.nationkey"
            ),
        )

        with open("/run/secrets/kubernetes.io/serviceaccount/namespace") as f:
            namespace = f.read().strip()
        spark_app_name = "orders-by-nation-" + datetime.utcnow().strftime("%Y%m%d%H%M%S")

        # OpenLineage dataset namespace Airflow uses for Trino tables. It is derived from the
        # AIRFLOW_CONN_TRINO_DEFAULT connection (host `trino-coordinator`, port 8443), so it must stay
        # in sync with that connection. Declaring the Spark step's datasets under this same namespace
        # (and the same table names the Trino SQL tasks produce) is what stitches the Spark step onto
        # the ELT graph: `lakehouse.demo.customer_orders` becomes the shared input/output node.
        trino_ol_namespace = "trino://trino-coordinator:8443"

        # Single operator: submits the SparkApplication, waits for it, declares its datasets, and links
        # the Spark run to this task. No separate sensor => no empty monitor job.
        spark_orders_by_nation = SparkKubernetesOperator(
            task_id="spark_orders_by_nation",
            namespace=namespace,
            application_file=build_spark_application(spark_app_name, namespace),
            openlineage_inputs=[(trino_ol_namespace, "lakehouse.demo.customer_orders")],
            openlineage_outputs=[(trino_ol_namespace, "lakehouse.demo.orders_by_nation")],
        )

        create_schema >> [load_customers, load_orders] >> customer_orders >> spark_orders_by_nation
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-credentials
type: Opaque
stringData:
  adminUser.username: admin
  adminUser.firstname: Airflow
  adminUser.lastname: Admin
  adminUser.email: airflow@airflow.com
  adminUser.password: "{{ airflowAdminPassword }}"
---
# Credentials for the Airflow metadata database (the postgresql-airflow chart in this stack).
# The operator reads the `username`/`password` keys and builds the SQLAlchemy URL from the
# clusterConfig.metadataDatabase block above.
apiVersion: v1
kind: Secret
metadata:
  name: airflow-postgresql-credentials
type: Opaque
stringData:
  username: airflow
  password: airflow
