# Marquez is the OpenLineage reference metadata server + web UI, used here as the consuming
# application for the lineage that Trino and Airflow emit. It is only part of this *demo* - it is
# not an SDP product.
#
# VENDORED MANIFESTS - do not hand-edit the resources below; regenerate instead.
# Marquez publishes NO Helm repository or OCI chart (the old
# https://marquezproject.github.io/marquez/ repo URL 404s), so we render the upstream chart to
# static YAML and ship that as a plainYaml manifest.
#
# Chart:   marquez 0.51.1 (Apache-2.0) - https://github.com/MarquezProject/marquez/tree/main/chart
# Regenerate:
#   git clone --depth 1 --branch 0.51.1 https://github.com/MarquezProject/marquez.git
#   helm repo add bitnami https://charts.bitnami.com/bitnami   # for the postgresql/common subcharts
#   ( cd marquez/chart && helm dependency build )
#   helm template marquez ./marquez/chart -f VALUES --skip-tests \
#     | grep -v '^  namespace: "default"$' > marquez.yaml   # strip test hooks + hardcoded ns
#   # ...then re-add this header.
#
# VALUES used (the chart applies one shared service.{type,port} to BOTH Services - there is no
# per-service override, so the API and web UI necessarily get the same type/port):
#   fullnameOverride: marquez
#   service: {type: NodePort, port: 5000}   # API Service becomes marquez:5000 (what Trino/Airflow
#                                           # target and what the web backend calls); marquez-web
#                                           # NodePort exposes the UI. Postgres stays ClusterIP.
#   web.enabled: true
#   postgresql: {enabled: true, auth: marquez/marquez/marquez,
#                image.repository: bitnamilegacy/postgresql, global...allowInsecureImages: true}
#
# Resulting Services: marquez:5000 (API), marquez-web:5000 (UI, NodePort), marquez-postgresql:5432.
