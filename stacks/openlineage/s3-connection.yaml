# S3 (MinIO) connection shared by Trino (Iceberg catalog), the Hive metastore and Spark.
#
# The Spark part of this demo writes an Iceberg table to the `demo` bucket on MinIO and Trino
# reads it back, so both engines resolve table locations through this single S3Connection. MinIO is
# deployed with TLS (see the minio-distributed-small-tls template referenced from the stack), hence
# the `tls` verification block pointing at the `tls` SecretClass that secret-operator ships.
---
apiVersion: s3.stackable.tech/v1alpha1
kind: S3Connection
metadata:
  name: minio
spec:
  host: minio.{{ NAMESPACE }}.svc.cluster.local
  port: 9000
  accessStyle: Path
  credentials:
    secretClass: minio-s3-credentials
  tls:
    verification:
      server:
        caCert:
          secretClass: tls
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: minio-s3-credentials
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-s3-credentials
  labels:
    secrets.stackable.tech/class: minio-s3-credentials
stringData:
  accessKey: admin
  secretKey: "{{ minioAdminPassword }}"
