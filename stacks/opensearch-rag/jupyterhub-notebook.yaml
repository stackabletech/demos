       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "# OpenSearch RAG Demo with Llama 3.1 8B",
        "",
        "This notebook demonstrates Retrieval Augmented Generation (RAG) using:",
        "- **OpenSearch** for hybrid search (k-NN + BM25)",
        "- **Ollama with Llama 3.1 8B** for text generation",
        "- **nomic-embed-text** for embeddings"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Setup"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "# Install required packages",
        "!pip install opensearch-py requests urllib3 -q"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "import os",
        "import json",
        "import requests",
        "from opensearchpy import OpenSearch",
        "import warnings",
        "warnings.filterwarnings('ignore')",
        "",
        "# Configuration from environment variables",
        "OPENSEARCH_HOST = os.getenv('OPENSEARCH_HOST', 'opensearch')",
        "OPENSEARCH_PORT = int(os.getenv('OPENSEARCH_PORT', '9200'))",
        "OPENSEARCH_USER = os.getenv('OPENSEARCH_USER', 'admin')",
        "OPENSEARCH_PASSWORD = os.getenv('OPENSEARCH_PASSWORD', 'adminadmin')",
        "OLLAMA_HOST = os.getenv('OLLAMA_HOST', 'ollama')",
        "OLLAMA_PORT = int(os.getenv('OLLAMA_PORT', '11434'))",
        "INDEX_NAME = 'rag-documents'",
        "",
        "print(f\"✓ OpenSearch: {OPENSEARCH_HOST}:{OPENSEARCH_PORT}\")",
        "print(f\"✓ Ollama: {OLLAMA_HOST}:{OLLAMA_PORT}\")",
        "print(f\"✓ Index: {INDEX_NAME}\")"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Connect to Services"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "# Initialize OpenSearch client",
        "opensearch_client = OpenSearch(",
        "    hosts=[{'host': OPENSEARCH_HOST, 'port': OPENSEARCH_PORT}],",
        "    http_auth=(OPENSEARCH_USER, OPENSEARCH_PASSWORD),",
        "    use_ssl=True,",
        "    verify_certs=False,",
        "    ssl_show_warn=False",
        ")",
        "",
        "# Test connection",
        "info = opensearch_client.info()",
        "print(f\"✓ Connected to OpenSearch {info['version']['number']}\")",
        "",
        "# Check index",
        "if opensearch_client.indices.exists(index=INDEX_NAME):",
        "    count = opensearch_client.count(index=INDEX_NAME)['count']",
        "    print(f\"✓ Index '{INDEX_NAME}' has {count} chunks\")",
        "else:",
        "    print(f\"⚠ Index '{INDEX_NAME}' does not exist. Run the data ingestion job first.\")"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "# Test Ollama connection",
        "response = requests.get(f'http://{OLLAMA_HOST}:{OLLAMA_PORT}/api/tags')",
        "models = response.json().get('models', [])",
        "print(f\"✓ Ollama is running with {len(models)} models:\")",
        "for model in models:",
        "    print(f\"  - {model['name']}\")"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Helper Functions"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "# Operator name to repo mapping",
        "OPERATOR_MAP = {",
        "    'trino': 'trino-operator',",
        "    'airflow': 'airflow-operator',",
        "    'druid': 'druid-operator',",
        "    'hdfs': 'hdfs-operator',",
        "    'hbase': 'hbase-operator',",
        "    'hive': 'hive-operator',",
        "    'kafka': 'kafka-operator',",
        "    'nifi': 'nifi-operator',",
        "    'opensearch': 'opensearch-operator',",
        "    'spark': 'spark-k8s-operator',",
        "    'superset': 'superset-operator',",
        "    'zookeeper': 'zookeeper-operator',",
        "    'opa': 'opa-operator',",
        "    'secret': 'secret-operator',",
        "    'listener': 'listener-operator',",
        "    'commons': 'commons-operator'",
        "}",
        "",
        "def detect_operator(query):",
        "    \"\"\"Detect operator name in query and return repo name.\"\"\"",
        "    query_lower = query.lower()",
        "    for keyword, repo in OPERATOR_MAP.items():",
        "        if keyword in query_lower:",
        "            return repo",
        "    return None",
        "",
        "def is_implementation_query(query):",
        "    \"\"\"Detect if query is asking for implementation details.\"\"\"",
        "    impl_keywords = ['how', 'deploy', 'configure', 'setup', 'install', 'create', 'implement', 'example']",
        "    query_lower = query.lower()",
        "    return any(keyword in query_lower for keyword in impl_keywords)",
        "",
        "def get_embedding(text):",
        "    \"\"\"Generate embedding for text using Ollama.\"\"\"",
        "    response = requests.post(",
        "        f'http://{OLLAMA_HOST}:{OLLAMA_PORT}/api/embeddings',",
        "        json={",
        "            'model': 'nomic-embed-text',",
        "            'prompt': text",
        "        }",
        "    )",
        "    response.raise_for_status()",
        "    return response.json()['embedding']",
        "",
        "def search_documents(query, k=10):",
        "    \"\"\"Search for relevant document chunks using hybrid search (k-NN + BM25).\"\"\"",
        "    query_embedding = get_embedding(query)",
        "    ",
        "    # Detect operator in query for metadata filtering",
        "    detected_repo = detect_operator(query)",
        "    ",
        "    # Build k-NN query with optional repo filter",
        "    knn_query = {",
        "        'embedding': {",
        "            'vector': query_embedding,",
        "            'k': k * 3  # Get more candidates for rescoring",
        "        }",
        "    }",
        "    ",
        "    # Add repo filter if operator detected",
        "    if detected_repo:",
        "        knn_query['embedding']['filter'] = {",
        "            'term': {'repo': detected_repo}",
        "        }",
        "    ",
        "    # Build rescore query with two-tier foundational content boost",
        "    rescore_should = [",
        "        {",
        "            'multi_match': {",
        "                'query': query,",
        "                'fields': ['title^1.5', 'content'],",
        "                'type': 'best_fields'",
        "            }",
        "        },",
        "        # HIGH BOOST: Specific setup/installation pages (the actual content)",
        "        {",
        "            'multi_match': {",
        "                'query': 'setup installation deployment configuration',",
        "                'fields': ['title^4', 'hierarchy^4'],",
        "                'type': 'best_fields',",
        "                'boost': 8.0",
        "            }",
        "        },",
        "        # MEDIUM BOOST: General getting-started pages (might be navigation)",
        "        {",
        "            'multi_match': {",
        "                'query': 'getting started first steps quickstart',",
        "                'fields': ['title^2', 'hierarchy^2'],",
        "                'type': 'best_fields',",
        "                'boost': 3.0",
        "            }",
        "        }",
        "    ]",
        "    ",
        "    # Boost documents with code blocks for implementation queries (but less than foundational)",
        "    if is_implementation_query(query):",
        "        rescore_should.append({",
        "            'term': {",
        "                'has_code_block': {",
        "                    'value': True,",
        "                    'boost': 1.5",
        "                }",
        "            }",
        "        })",
        "    ",
        "    # Hybrid search using k-NN with rescore for text matching",
        "    # OpenSearch doesn't support knn inside bool.should, so we use rescore instead",
        "    search_body = {",
        "        'size': k,",
        "        'query': {",
        "            'knn': knn_query",
        "        },",
        "        'rescore': {",
        "            'window_size': k * 3,",
        "            'query': {",
        "                'rescore_query': {",
        "                    'bool': {",
        "                        'should': rescore_should",
        "                    }",
        "                },",
        "                'query_weight': 0.7,      # Favor k-NN semantic similarity",
        "                'rescore_query_weight': 0.3  # Reduce keyword matching influence",
        "            }",
        "        },",
        "        '_source': ['title', 'content', 'category', 'repo', 'has_code_block', 'url']",
        "    }",
        "    ",
        "    response = opensearch_client.search(",
        "        index=INDEX_NAME,",
        "        body=search_body",
        "    )",
        "    ",
        "    results = []",
        "    for hit in response['hits']['hits']:",
        "        results.append({",
        "            'title': hit['_source']['title'],",
        "            'content': hit['_source']['content'],",
        "            'category': hit['_source']['category'],",
        "            'repo': hit['_source'].get('repo', ''),",
        "            'has_code_block': hit['_source'].get('has_code_block', False),",
        "            'url': hit['_source'].get('url', ''),",
        "            'score': hit['_score']",
        "        })",
        "    ",
        "    return results",
        "",
        "def generate_response(query, context_docs, stream=True):",
        "    \"\"\"Generate response using Llama 3.1 8B with retrieved context.\"\"\"",
        "    # Build context with relevance scores and URLs",
        "    context = \"\\\\n\\\\n\".join([",
        "        f\"Source: {doc['title']} (from {doc['repo']}, relevance: {doc['score']:.2f})\\\\nURL: {doc.get('url', 'N/A')}\\\\n{doc['content']}\"",
        "        for i, doc in enumerate(context_docs)",
        "    ])",
        "    ",
        "    prompt = f\"\"\"You are a technical documentation assistant for Stackable Data Platform. Answer the question using ONLY the provided context.",
        "",
        "IMPORTANT RULES:",
        "- Use only information from the sources below",
        "- Focus on sources with higher relevance scores",
        "- Include documentation URLs for further reading where relevant",
        "- Do NOT make up URLs - only use URLs provided in the context",
        "- If the answer is not in the context, say so clearly",
        "- Be concise and technical",
        "",
        "Context:",
        "{context}",
        "",
        "Question: {query}",
        "",
        "Answer:\"\"\"",
        "    ",
        "    # Call Ollama with streaming",
        "    response = requests.post(",
        "        f'http://{OLLAMA_HOST}:{OLLAMA_PORT}/api/generate',",
        "        json={",
        "            'model': 'llama3.1:8b',",
        "            'prompt': prompt,",
        "            'stream': stream",
        "        },",
        "        stream=stream",
        "    )",
        "    response.raise_for_status()",
        "    ",
        "    if stream:",
        "        # Stream tokens as they're generated",
        "        full_response = \"\"",
        "        for line in response.iter_lines():",
        "            if line:",
        "                chunk = json.loads(line)",
        "                if 'response' in chunk:",
        "                    token = chunk['response']",
        "                    print(token, end='', flush=True)",
        "                    full_response += token",
        "        print()  # New line after streaming",
        "        return full_response",
        "    else:",
        "        # Return complete response",
        "        return response.json()['response']",
        "",
        "def rag_query(query, k=10, stream=True):",
        "    \"\"\"Complete RAG workflow: search + generate.\"\"\"",
        "    print(f\"\\\\n🔍 Query: {query}\")",
        "    ",
        "    # Show if operator detected",
        "    detected_repo = detect_operator(query)",
        "    if detected_repo:",
        "        print(f\"🎯 Detected operator: {detected_repo}\")",
        "    ",
        "    print(\"\\\\n📚 Retrieving relevant chunks...\")",
        "    ",
        "    context_docs = search_documents(query, k=k)",
        "    ",
        "    print(f\"\\\\nFound {len(context_docs)} relevant chunks:\")",
        "    for i, doc in enumerate(context_docs, 1):",
        "        code_indicator = \" 📝\" if doc.get('has_code_block') else \"\"",
        "        print(f\"  {i}. {doc['title']} (score: {doc['score']:.3f}){code_indicator}\")",
        "        print(f\"     Repo: {doc['repo']}\")",
        "        print(f\"     Page: {doc['url']}\")",
        "    ",
        "    print(\"\\\\n🤖 Generating response with Llama 3.1 8B...\")",
        "    print(\"\\\\n💬 Answer:\")",
        "    answer = generate_response(query, context_docs, stream=stream)",
        "    print(\"\\\\n\" + \"=\"*80)",
        "    ",
        "    return {'query': query, 'context': context_docs, 'answer': answer}",
        "",
        "print(\"✓ Helper functions loaded\")"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Example 1: Ask about OpenSearch"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "result = rag_query(\"What is OpenSearch and what are its key features?\")"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Example 2: Ask about security features"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "result = rag_query(\"What security features does Stackable provide?\")"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Example 3: Ask about Stackable operators"
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
       "outputs": [],
       "source": [
        "result = rag_query(\"How do I deploy a Trino cluster with Stackable?\")"
       ]
      },
      {
       "cell_type": "markdown",
       "metadata": {},
       "source": [
        "## Try Your Own Questions!",
        "",
        "Use the cell below to ask your own questions about the Stackable Platform."
       ]
      },
      {
       "cell_type": "code",
       "execution_count": null,
       "metadata": {},
