        "# Try your own question here",
        "my_query = \"YOUR QUESTION HERE\"",
        "",
        "# Use stream=True (default) to watch tokens generate in real-time",
        "# Use stream=False for instant complete response",
        "result = rag_query(my_query, stream=True)"
       ]
      }
