# DataHub's MySQL prerequisite chart references this secret by name, but does
# not auto-create it. We create it explicitly so the mysql pod starts cleanly.
#
# Dev-only credentials. Do not use for anything customer-facing.
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  labels:
    stackable.tech/vendor: Stackable
stringData:
  mysql-root-password: datahub
