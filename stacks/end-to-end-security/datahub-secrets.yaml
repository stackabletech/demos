---
apiVersion: v1
kind: Secret
metadata:
  name: datahub-auth-secrets
  labels:
    stackable.tech/vendor: Stackable
stringData:
  system_client_secret: datahub-demo-system-secret
  # MUST be >= 32 bytes (32 ASCII chars). GMS signs session/PAT tokens with HS256,
  # and the JJWT lib rejects keys < 256 bits with a WeakKeyException -> GMS 500 on
  # frontend login. (Ingestion is unaffected: system Basic auth never uses this key.)
  token_service_signing_key: datahub-demo-token-signing-key-min-32-bytes
  token_service_salt: datahub-demo-token-salt
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  labels:
    stackable.tech/vendor: Stackable
stringData:
  mysql-root-password: datahub
