# yamllint disable-file
---
# RBAC so the Airflow service account may submit (and observe) SparkApplications.
# The driver/executor pods themselves run under the `spark` service account
# (see serviceaccount.yaml), which already has the pod/service/configmap perms
# the Spark-on-K8s scheduler needs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: airflow-spark-submit
rules:
  - apiGroups:
      - spark.stackable.tech
    resources:
      - sparkapplications
    verbs:
      - create
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: airflow-spark-submit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: airflow-spark-submit
subjects:
  - kind: ServiceAccount
    name: airflow-serviceaccount
    namespace: default
---
# {% raw %}
# The PySpark job promoted from query-exchange-rates.ipynb. The notebook ran in
# client mode and configured the session inline; here the session bootstrap lives
# in the SparkApplication CRD (spark_app.yaml) and only the transformation logic
# remains as code. It reads the same staged HDFS data and writes to the same HDFS
# path the notebook uses (deliberately distinct from the Trino DAG's table).
apiVersion: v1
kind: ConfigMap
metadata:
  name: exchange-rates-spark-script
data:
  exchange-rates.py: |
    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F
    from pyspark.sql.window import Window

    INPUT_PATH = "hdfs://hdfs/staging/exchange_rates/rates"
    OUTPUT_PATH = "hdfs://hdfs/staging/aggregations/rates_to_euros_tb"

    spark = SparkSession.builder.appName("exchange-rates").getOrCreate()

    df = spark.read.parquet(INPUT_PATH)
    base_rates = (
        df
        .filter(
            (F.col("time_format") == "P1Y")
            & (F.col("collection") == "E")
            & (F.col("currency_denom") == "EUR")
        )
        .select(
            F.col("time_period").cast("int").alias("time_period"),
            F.col("currency"),
            F.col("obs_value"),
        )
    )

    window_spec = Window.partitionBy("currency").orderBy("time_period")

    rolling = base_rates.select(
        "time_period",
        "currency",
        "obs_value",
        F.avg("obs_value").over(window_spec.rowsBetween(0, 0)).alias("rolling_avg_1y"),
        F.avg("obs_value").over(window_spec.rowsBetween(-2, 0)).alias("rolling_avg_3y"),
        F.avg("obs_value").over(window_spec.rowsBetween(-4, 0)).alias("rolling_avg_5y"),
        F.avg("obs_value").over(window_spec.rowsBetween(-9, 0)).alias("rolling_avg_10y"),
    )

    final_df = rolling.withColumns({
        "pct_change_vs_3y_avg": ((F.col("obs_value") - F.col("rolling_avg_3y")) / F.col("rolling_avg_3y")) * 100,
        "pct_change_vs_5y_avg": ((F.col("obs_value") - F.col("rolling_avg_5y")) / F.col("rolling_avg_5y")) * 100,
        "pct_change_vs_10y_avg": ((F.col("obs_value") - F.col("rolling_avg_10y")) / F.col("rolling_avg_10y")) * 100,
    })

    final_df.write.mode("overwrite").parquet(OUTPUT_PATH)

    print(f"Wrote aggregated rates to {OUTPUT_PATH}")
    spark.stop()
# {% endraw %}
