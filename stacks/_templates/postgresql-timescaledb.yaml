---
releaseName: postgresql-timescaledb
name: timescaledb-single
repo:
  name: timescale
  url: https://charts.timescale.com/
version: 0.33.1
options:
  podLabels:
    stackable.tech/vendor: Stackable
    stackable.tech/stack: {{ STACK }}
    # The following is a Jinja2 template directive, not a regular comment.
    # The `#` prefix is required to prevent YAML parsing errors, but Jinja2 still processes it.
    # {% if DEMO is defined %}
    stackable.tech/demo: {{ DEMO }}
    # {% endif %}
  replicaCount: 1
  secrets:
    credentials:
      PATRONI_SUPERUSER_PASSWORD: "{{ postgresAdminPassword }}"
      PATRONI_REPLICATION_PASSWORD: ""
      PATRONI_admin_PASSWORD: "{{ postgresAdminPassword }}"
      PATRONI_admin_OPTIONS: createrole,createdb
  image:
    repository: timescale/timescaledb-ha
    tag: pg15.2-ts2.10.2-patroni-dcs-failsafe-p0 # fixes service account. originally: pg14.6-ts2.9.1-p1
    pullPolicy: Always
