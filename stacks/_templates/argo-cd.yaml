---
releaseName: argocd
name: argo-cd
repo:
  name: argo-cd
  url: https://argoproj.github.io/argo-helm
version: 9.4.10 # v3.3.3
options:
  global:
    additionalLabels:
      stackable.tech/vendor: Stackable
      stackable.tech/stack: {{ STACK }}
      # The following is a Jinja2 template directive, not a regular comment.
      # The `#` prefix is required to prevent YAML parsing errors, but Jinja2 still processes it.
      # {% if DEMO is defined %}
      stackable.tech/demo: {{ DEMO }}
      # {% endif %}
  configs:
    secret:
      argocdServerAdminPassword: "{{ argocdAdminPassword }}"
      # We have to set the time otherwise error message:
      # invalid session: Account password has changed since token issued
      argocdServerAdminPasswordMtime: "2025-01-01T00:00:00Z"
  dex:
    enabled: false
  notifications:
    enabled: false
