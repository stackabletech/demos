---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:22.0.3
          args:
            - start-dev
            - --import-realm
#            - --hostname-url=http://keycloak:8080
            - --hostname-strict=false
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: admin
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /realms/master
              port: http
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data/
            - name: realm-config
              mountPath: /opt/keycloak/data/import
            - name: tls
              mountPath: /tls/
        - name: create-auth-class
          image: docker.stackable.tech/stackable/testing-tools:0.2.0-stackable0.0.0-dev # We need 0.0.0-dev, so we get kubectl
          command: ["/bin/bash", "-c"]
          args:
            - |
              pid=
              trap 'echo SIGINT; [[ $pid ]] && kill $pid; exit' SIGINT
              trap 'echo SIGTERM; [[ $pid ]] && kill $pid; exit' SIGTERM

              while :
              do
                echo "Determining Keycloak public reachable address"
                KEYCLOAK_HOSTNAME="$(kubectl get svc keycloak -o json | jq -r '.status.loadBalancer.ingress[0].ip')"
                KEYCLOAK_PORT="8080"
                echo "Found Keycloak running at $KEYCLOAK_HOSTNAME:$KEYCLOAK_PORT"

                if [ ! -z "$KEYCLOAK_HOSTNAME" ]; then
                  cat << EOF | kubectl apply -f -
                    apiVersion: authentication.stackable.tech/v1alpha1
                    kind: AuthenticationClass
                    metadata:
                      name: keycloak
                    spec:
                      provider:
                        oidc:
                          hostname: "$KEYCLOAK_HOSTNAME"
                          port: $KEYCLOAK_PORT
                          rootPath: /realms/demo
                          scopes: [openid]
                          principalClaim: preferred_username
                          tls: null
                          #   verification:
                          #     server:
                          #       caCert:
                          #         secretClass: tls
              EOF
                fi

                sleep 30 & pid=$!
                wait
              done
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-data
        - name: realm-config
          secret:
            secretName: keycloak-realm-config
        - name: tls
          ephemeral:
            volumeClaimTemplate:
              metadata:
                annotations:
                  secrets.stackable.tech/class: tls
                  secrets.stackable.tech/format: tls-pkcs12
                  secrets.stackable.tech/format.compatibility.tls-pkcs12.password: changeit
                  secrets.stackable.tech/scope: service=keycloak,node
              spec:
                storageClassName: secrets.stackable.tech
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: "1"
      serviceAccountName: keycloak-serviceaccount
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  type: LoadBalancer
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-credentials
stringData:
  admin: "{{ keycloakAdminPassword }}"
