# https://github.com/grafana/helm-charts/tree/main/charts/tempo
---
releaseName: tempo
name: tempo
repo:
  name: tempo
  url: https://grafana.github.io/helm-charts
# Watch out for https://github.com/grafana/helm-charts/issues/3417
# Workaround at: https://github.com/grafana/helm-charts/issues/3660#issuecomment-3007113458
# To find the latest version:
# helm repo add grafana https://grafana.github.io/helm-charts --force-update
# helm search repo grafana/tempo
version: 1.24.4 # 2.9.0
options:
  global:
    commonLabels:
      stackable.tech/vendor: Stackable
      stackable.tech/stack: {{ STACK }}
      # The following is a Jinja2 template directive, not a regular comment.
      # The `#` prefix is required to prevent YAML parsing errors, but Jinja2 still processes it.
      # {% if DEMO is defined %}
      stackable.tech/demo: {{ DEMO }}
      # {% endif %}
  tempo:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
  tempoQuery:
    enabled: true
