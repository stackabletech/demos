# https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-operator
---
releaseName: opentelemetry-operator
name: opentelemetry-operator
repo:
  name: opentelemetry-operator
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
# Find the newest chart at https://github.com/open-telemetry/opentelemetry-helm-charts/releases
version: 0.107.0 # 0.146.0
options:
  additionalLabels:
    stackable.tech/vendor: Stackable
    stackable.tech/stack: {{ STACK }}
    # The following is a Jinja2 template directive, not a regular comment.
    # The `#` prefix is required to prevent YAML parsing errors, but Jinja2 still processes it.
    # {% if DEMO is defined %}
    stackable.tech/demo: {{ DEMO }}
    # {% endif %}
  admissionWebhooks:
    certManager:
      enabled: false
  manager:
    collectorImage:
      repository: "otel/opentelemetry-collector-contrib"
