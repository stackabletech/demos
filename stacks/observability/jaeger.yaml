# https://github.com/jaegertracing/helm-charts/tree/main/charts/jaeger
# The jaeger allInOne mode doesn't support NodePort services.
---
releaseName: jaeger
name: jaeger
repo:
  name: jaeger
  url: https://jaegertracing.github.io/helm-charts
# To find the latest version:
# helm repo add jaegertracing https://jaegertracing.github.io/helm-charts --force-update
# helm search repo jaegertracing/jaeger
version: 4.5.0 # 2.15.1
options:
  commonLabels:
    stackable.tech/vendor: Stackable
    stackable.tech/stack: {{ STACK }}
    # The following is a Jinja2 template directive, not a regular comment.
    # The `#` prefix is required to prevent YAML parsing errors, but Jinja2 still processes it.
    # {% if DEMO is defined %}
    stackable.tech/demo: {{ DEMO }}
    # {% endif %}
  provisionDataStore:
    cassandra: false
  allInOne:
    enabled: true
  storage:
    type: memory
  agent:
    enabled: false
  collector:
    enabled: false
  query:
    enabled: false
