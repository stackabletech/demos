# yamllint disable rule:comments-indentation
---
# https://github.com/grafana-community/helm-charts/tree/main/charts/grafana
releaseName: grafana
name: grafana
repo:
  name: grafana
  url: https://grafana-community.github.io/helm-charts
# To find the latest version:
# helm repo add grafana-community https://grafana-community.github.io/helm-charts --force-update
# helm search repo grafana-community/grafana
version: 11.3.2 # 12.4.1
options:
  extraLabels:
    stackable.tech/vendor: Stackable
    stackable.tech/stack: {{ STACK }}
    # The following is a Jinja2 template directive, not a regular comment.
    # The `#` prefix is required to prevent YAML parsing errors, but Jinja2 still processes it.
    # {% if DEMO is defined %}
    stackable.tech/demo: {{ DEMO }}
    # {% endif %}
  admin:
    existingSecret: grafana-admin-credentials
  service:
    type: NodePort
    port: 443
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
          isDefault: false
          jsonData:
            tlsAuthWithCACert: false
        - name: Tempo
          type: tempo
          url: http://tempo:3200
          access: proxy
          isDefault: false
          jsonData:
            tlsAuthWithCACert: false
  readinessProbe:
    httpGet:
      scheme: HTTPS
  livenessProbe:
    httpGet:
      scheme: HTTPS
  testFramework:
    enabled: false
  resources:
    limits:
      cpu: 2000m
      memory: 1024Mi
    requests:
      cpu: 1000m
      memory: 256Mi
  persistence:
    enabled: true
    # storageClassName: default
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    # annotations: {}
    finalizers: []
  env:
    # Enable HTTPS, using a Certificate from the Secret Operator
    GF_SERVER_PROTOCOL: https
    GF_SERVER_CERT_FILE: /etc/grafana/certs/tls.crt
    GF_SERVER_CERT_KEY: /etc/grafana/certs/tls.key
  extraVolumeMounts:
    # Mount the certificate generated by the secret-operator
    - name: tls
      mountPath: /etc/grafana/certs/
  extraContainerVolumes:
    # Request a TLS certificate from the secret-operator
    - name: tls
      ephemeral:
        volumeClaimTemplate:
          metadata:
            annotations:
              secrets.stackable.tech/class: tls
              secrets.stackable.tech/scope: node,pod,service=grafana
          spec:
            storageClassName: secrets.stackable.tech
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "1"
