---
apiVersion: hdfs.stackable.tech/v1alpha1
kind: HdfsCluster
metadata:
  name: hdfs
spec:
  image:
    productVersion: 3.3.6
    custom: docker.stackable.tech/stackable-experimental/hadoop:3.3.6-stackable24.3.0
  clusterConfig:
    dfsReplication: 1
    zookeeperConfigMapName: hdfs-znode
  nameNodes:
    roleGroups:
      default:
        replicas: 2
  dataNodes:
    roleGroups:
      default:
        replicas: 1
  journalNodes:
    roleGroups:
      default:
        replicas: 1
