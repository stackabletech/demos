---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive
spec:
  image:
    productVersion: 4.0.0
  clusterConfig:
    metadataDatabase:
      postgresql:
        host: postgresql-hive
        database: hive
        credentialsSecretName: hive-postgres-credentials
    s3:
      reference: minio
  metastore:
    roleGroups:
      default:
        replicas: 1
---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive-iceberg
spec:
  image:
    # Cannot upgrade to 4.0.1 because we run into github.com/apache/iceberg/issues/12878
    productVersion: 4.0.0
  clusterConfig:
    metadataDatabase:
      postgresql:
        host: postgresql-hive-iceberg
        database: hive
        credentialsSecretName: hive-postgres-credentials
    s3:
      reference: minio
  metastore:
    roleGroups:
      default:
        replicas: 1
---
apiVersion: v1
kind: Secret
metadata:
  name: hive-postgres-credentials
type: Opaque
stringData:
  username: hive
  password: hive
